<table cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#FAFAFB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <tr>
    <td align="center" style="padding:40px 16px;">
      <table cellpadding="0" cellspacing="0" border="0" width="480" style="max-width:480px;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:16px;padding:40px 36px;">
        <tr>
          <td align="center" style="padding-bottom:24px;">
            <div style="width:56px;height:56px;line-height:56px;background:#667eea;border-radius:14px;color:#FFFFFF;font-size:28px;font-weight:700;">K</div>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:28px;">
            <div style="font-size:20px;font-weight:700;color:#0F172A;">Kairo</div>
            <div style="font-size:12px;font-weight:500;color:#94A3B8;margin-top:4px;text-transform:uppercase;letter-spacing:0.08em;">Le bon job, au bon moment</div>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:8px;">
            <div style="font-size:22px;font-weight:700;color:#0F172A;">Ton code</div>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:24px;">
            <div style="font-size:15px;line-height:1.55;color:#64748B;">Saisis les 6&nbsp;chiffres ci-dessous dans Kairo.</div>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:12px;">
            <div style="display:inline-block;background:#F1F5F9;border-radius:12px;padding:20px 30px;font-family:'SF Mono',Menlo,Monaco,Consolas,monospace;font-size:36px;font-weight:600;letter-spacing:10px;color:#667eea;">{{ .Token }}</div>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:28px;">
            <div style="font-size:13px;color:#94A3B8;">Valable 10&nbsp;minutes.</div>
          </td>
        </tr>
        <tr>
          <td>
            <div style="height:1px;background:#F1F5F9;width:100%;margin-bottom:20px;"></div>
            <div style="font-size:13px;line-height:1.6;color:#64748B;">Tu n'es pas à l'origine de cette demande&nbsp;? Ignore ce message.</div>
          </td>
        </tr>
      </table>
      <div style="font-size:12px;color:#94A3B8;margin-top:20px;">Envoyé par Kairo.</div>
    </td>
  </tr>
</table>
