name: Scraper

# Phase 5 — continuous scraper loop. Runs hourly via cron, plus manual
# trigger from the GitHub UI (Actions → Scraper → "Run workflow") for ad-hoc
# debugging. Per-run telemetry is written to the `scraper_runs` Supabase
# table by run.py itself ; this workflow's only job is to invoke it.
#
# Required repo secrets (Settings → Secrets and variables → Actions) :
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   GROQ_API_KEY
#   GEMINI_API_KEY     (optional — fallback only)

on:
  schedule:
    # Top of every hour, UTC. GitHub may delay or skip cron runs under load,
    # which is fine : `_process_user` is idempotent (jobs upsert by hash,
    # matches insert-or-skip on duplicate (user_id, job_id)).
    - cron: '0 * * * *'
  workflow_dispatch:
    # Manual trigger — handy for re-running after a fix without waiting for
    # the next cron tick.

# A second cron tick that fires while the previous run is still scraping
# would just duplicate work and burn LLM quota. Cancel the in-flight run
# rather than queueing — fresher data wins.
concurrency:
  group: scraper
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    # 25 min hard cap — a healthy run is 5–10 min for the current user count ;
    # if we ever cross 25 min something is wrong (rate-limit storm, hung
    # network) and a kill is preferable to a runaway job.
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GITHUB_ACTIONS / GITHUB_REPOSITORY / GITHUB_RUN_ID are auto-injected
          # by the runner — run.py picks them up to mark the row as runner='cron'
          # and stash the workflow run URL in scraper_runs.notes.
          PYTHONUNBUFFERED: '1'
        run: python -m app.scraper.run
