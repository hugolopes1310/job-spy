name: Job Tracker Scan

on:
  schedule:
    # ~15 runs/jour — toutes les 1h de 7h à 23h heure française (UTC+2)
    - cron: '0 5 * * *'    # 07h
    - cron: '0 6 * * *'    # 08h
    - cron: '0 7 * * *'    # 09h
    - cron: '0 8 * * *'    # 10h
    - cron: '0 9 * * *'    # 11h
    - cron: '0 10 * * *'   # 12h
    - cron: '0 11 * * *'   # 13h
    - cron: '0 12 * * *'   # 14h
    - cron: '0 13 * * *'   # 15h
    - cron: '0 14 * * *'   # 16h
    - cron: '0 15 * * *'   # 17h
    - cron: '0 16 * * *'   # 18h
    - cron: '0 17 * * *'   # 19h
    - cron: '0 18 * * *'   # 20h
    - cron: '0 19 * * *'   # 21h
    - cron: '0 20 * * *'   # 22h
    - cron: '0 21 * * *'   # 23h
  workflow_dispatch: {}     # permet de lancer manuellement

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py --once