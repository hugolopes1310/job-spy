# Search axes — multi-source (linkedin, indeed, google)
# =====================================================================
# "sites" accepts a list: [linkedin, indeed, google, glassdoor, zip_recruiter]
# Google Jobs indexes company career pages (Leonteq, Pictet, etc.)
# =====================================================================
