# =====================================================================
# Job Tracker config — Hugo Lopes
# =====================================================================

telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID

scoring:
  notify_threshold: 7
  llm_min_score: 5       # AI score minimum (0-10) pour envoyer sur Telegram

  title_boost:
    structurer: 6
    structureur: 6
    "structured products": 6
    "produits structurés": 6
    "cross asset": 5
    "multi asset": 4
    "investment solutions": 5
    "equity derivatives": 5
    "fixed income": 3
    "financial engineering": 4
    "investment advisor": 3
    "private equity": 3
    "private debt": 3
    "quant": 2
    "quantitative": 2
    "derivatives": 3
    "sales": 2
    "structuring": 5
    "advisory": 3
    "portfolio": 2

  description_boost:
    autocall: 3
    phoenix: 2
    cln: 2
    "reverse convertible": 2
    payoff: 2
    termsheet: 2
    rfq: 2
    python: 0
    vba: 0
    bloomberg: 1
    "buy-side": 1
    "sell-side": 1
    volatility: 1
    rates: 1
    leonteq: 2
    vontobel: 2
    pictet: 2
    "lombard odier": 2
    ubp: 2
    "julius baer": 2
    siparex: 2
    pandat: 2

  blacklist:
    # Seniority
    intern: -10
    stage: -10
    alternance: -10
    apprenti: -10
    "senior director": -6
    "managing director": -6
    "head of": -4
    director: -3
    # Middle/back office
    "middle office": -15
    "back office": -10
    settlement: -8
    reconciliation: -8
    "fund accounting": -8
    "transfer agent": -8
    nav: -5
    custodian: -6
    clearing: -6
    "trade support": -8
    operations: -4
    # Tech pur
    developer: -6
    "software engineer": -8
    devops: -8
    "data engineer": -8
    "full stack": -8
    sre: -6
    frontend: -6
    backend: -6
    # Fonctions non pertinentes
    coo: -5
    cfo: -5
    kyc: -5
    compliance: -4
    "risk manager": -3
    audit: -4
    comptable: -6
    accounting: -5

  location_boost:
    geneva: 4
    genève: 4
    zurich: 3
    zürich: 3
    lausanne: 3
    switzerland: 3
    suisse: 3
    lyon: 4
    "auvergne-rhône-alpes": 3

